{% extends "base.html" %}

{% block content %}
<h1>Write Blog</h1>

<form method="post" class="form">
    <label>Title</label>
    <input type="text" name="title" required>

    <label>Content</label>
    <textarea name="content" rows="6" required></textarea>

    <button type="submit">Publish</button>
</form>

{% endblock %}
