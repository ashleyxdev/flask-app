{% extends "base.html" %}

{% block content %}
<h1>All Blogs</h1>

{% if blogs|length == 0 %}
<p>No blogs yet. Be the first to write one ✍️</p>
{% endif %}

<div class="blogs">
    {% for blog in blogs %}
    <article class="blog">
        <h2 class="blog__title">{{ blog.title }}</h2>
        <p class="blog__content">{{ blog.content }}</p>
        <p class="blog__author">— {{ blog.author }}</p>
    </article>
    {% endfor %}
</div>

{% endblock %}
